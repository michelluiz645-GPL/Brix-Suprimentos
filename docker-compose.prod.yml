services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: geplan_app_prod
    restart: always
    working_dir: /var/www/backend
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - geplan

  webserver:
    image: nginx:1.27-alpine
    container_name: geplan_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./dist:/var/www/frontend:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - geplan

  db:
    image: mysql:8.0
    container_name: geplan_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-geplan}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - geplan_db_data_prod:/var/lib/mysql
    networks:
      - geplan

networks:
  geplan:
    driver: bridge

volumes:
  geplan_db_data_prod:
